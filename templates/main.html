<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
.switch {
  position: relative;
  display: inline-block;
  width: 60px;
  height: 34px;
}

.switch input { 
  opacity: 0;
  width: 0;
  height: 0;
}

.slider {
  position: absolute;
  cursor: pointer;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-color: #ccc;
  -webkit-transition: .7s;
  transition: .7s;
}

.slider:before {
  position: absolute;
  content: "";
  height: 26px;
  width: 26px;
  left: 4px;
  bottom: 4px;
  background-color: white;
  -webkit-transition: .7s;
  transition: .7s;
}

input:checked + .slider {
  background-color: #2196F3;
}

input:focus + .slider {
  box-shadow: 0 0 1px #2196F3;
}

input:checked + .slider:before {
  -webkit-transform: translateX(26px);
  -ms-transform: translateX(26px);
  transform: translateX(26px);
}

/* Rounded sliders */
.slider.round {
  border-radius: 34px;
}

.slider.round:before {
  border-radius: 50%;
}
</style>
</head>

<body>
	<form action="#" method="POST">
	<h1>GPIO Web Interface</h1>
	<p><input type="text" name="nme"></p>
	<p><input type="submit" value="submit"></p>
	</form>
	
	{% for key, value in var[1]["switch"].items(): %}
	{% if value == "OFF": %}
		<form  action="{{key}}/ON" method="POST">
	{% elif value == "ON": %}
		<form action="{{key}}/OFF" method="POST">
	{% endif %}
	<label class="switch">
	<input type="checkbox"  {{'checked=True' if value=='ON' else ''}} onclick="submit();">
	<span class="slider round"></span>
	
	</label>
	<h3>Switch {{key}} is {{value}}</h3></p><br>
	</form>
	{% endfor %}
	<p></p>
	<form action="/reset" method="POST">
	<p><input type="submit" value="Reset"></p>
	</form>
<h3>Status bar:{{var[0]}}</h3>
</body>

</html>
